<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super minesweeper</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body onload="onInit()">
    <header><h1>Super Minesweeper</h1></header>
    <button class="smiley" onclick="restartGame()">🙂</button>
    <h2 class="lives">❤️❤️❤️</h2>

    <div class="wrapper">
      <div class="levels">
        <button class="button" onclick="changeLevel(0)">Beginner</button>
        <button class="button" onclick="changeLevel(1)">Medium</button>
        <button class="button" onclick="changeLevel(2)">Expert</button>
      </div>

      <table class="board"></table>
    </div>

    <footer>
      <h2>Nevo Israeli</h2>
    </footer>
    <script src="js/util.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
